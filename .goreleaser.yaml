version: 2

builds:
  - binary: spark
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X spark-cli/cmd.Version={{ .Version }}

archives:
  - format_overrides:
      - goos: windows
        format: zip

dockers:
  - image_templates:
      - "finie/spark:{{ .Version }}-amd64"
      - "finie/spark:latest-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64

  - image_templates:
      - "finie/spark:{{ .Version }}-arm64"
      - "finie/spark:latest-arm64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "finie/spark:{{ .Version }}"
    image_templates:
      - "finie/spark:{{ .Version }}-amd64"
      - "finie/spark:{{ .Version }}-arm64"

  - name_template: "finie/spark:latest"
    image_templates:
      - "finie/spark:latest-amd64"
      - "finie/spark:latest-arm64"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
